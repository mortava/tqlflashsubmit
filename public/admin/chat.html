<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenPrice Admin — Live Chat</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #FAFAFA; color: #000; font-variant-numeric: tabular-nums;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 16px; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid rgba(39,39,42,0.15); margin-bottom: 16px; }
    .header h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.02em; }
    .header .badge { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 500; color: #22C55E; background: rgba(34,197,94,0.08); border: 1px solid rgba(34,197,94,0.2); padding: 2px 8px; border-radius: 4px; }
    .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: #22C55E; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .layout { display: grid; grid-template-columns: 320px 1fr; gap: 16px; height: calc(100vh - 120px); }
    @media (max-width: 768px) { .layout { grid-template-columns: 1fr; height: auto; } }

    .panel { background: #fff; border: 1px solid rgba(39,39,42,0.15); border-radius: 12px; overflow: hidden; display: flex; flex-direction: column; }
    .panel-header { padding: 14px 16px; border-bottom: 1px solid rgba(39,39,42,0.15); font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #71717A; }

    .convo-list { flex: 1; overflow-y: auto; }
    .convo-item { padding: 12px 16px; border-bottom: 1px solid rgba(39,39,42,0.08); cursor: pointer; transition: background 0.15s; }
    .convo-item:hover { background: #FAFAFA; }
    .convo-item.active { background: #000; color: #fff; }
    .convo-item.active .convo-meta { color: rgba(255,255,255,0.6); }
    .convo-item.active .convo-dept { color: rgba(255,255,255,0.5); border-color: rgba(255,255,255,0.2); }
    .convo-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .convo-meta { font-size: 11px; color: #A1A1AA; display: flex; align-items: center; gap: 8px; }
    .convo-dept { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; padding: 1px 6px; border: 1px solid rgba(39,39,42,0.15); border-radius: 4px; color: #71717A; }
    .convo-new { width: 8px; height: 8px; border-radius: 50%; background: #22C55E; flex-shrink: 0; }

    .chat-area { flex: 1; display: flex; flex-direction: column; }
    .messages { flex: 1; overflow-y: auto; padding: 16px; }
    .msg { margin-bottom: 12px; display: flex; flex-direction: column; }
    .msg.user { align-items: flex-end; }
    .msg.agent { align-items: flex-start; }
    .msg-bubble { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; }
    .msg.user .msg-bubble { background: #FAFAFA; border: 1px solid rgba(39,39,42,0.15); color: #000; }
    .msg.agent .msg-bubble { background: #000; color: #fff; }
    .msg-sender { font-size: 11px; font-weight: 600; color: #71717A; margin-bottom: 2px; letter-spacing: 0.02em; }
    .msg-time { font-size: 10px; color: #A1A1AA; margin-top: 2px; }

    .input-bar { padding: 12px 16px; border-top: 1px solid rgba(39,39,42,0.1); display: flex; gap: 8px; }
    .input-bar input { flex: 1; border: 1px solid rgba(39,39,42,0.3); border-radius: 8px; padding: 10px 12px; font-size: 14px; outline: none; transition: border-color 0.15s; font-family: inherit; }
    .input-bar input:focus { border-color: #000; }
    .input-bar button { width: 40px; height: 40px; border-radius: 8px; background: #000; color: #fff; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: opacity 0.15s; font-size: 16px; }
    .input-bar button:hover { opacity: 0.85; }
    .input-bar button:disabled { opacity: 0.5; cursor: not-allowed; }

    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #A1A1AA; font-size: 14px; gap: 8px; }
    .empty-state svg { width: 48px; height: 48px; opacity: 0.3; }

    .status-open { color: #22C55E; }
    .status-closed { color: #A1A1AA; }

    .tabs { display: flex; gap: 0; border-bottom: 1px solid rgba(39,39,42,0.15); }
    .tab { padding: 8px 16px; font-size: 12px; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; color: #A1A1AA; transition: all 0.15s; }
    .tab.active { color: #000; border-bottom-color: #000; }
    .tab:hover { color: #000; }

    .close-btn { margin-left: auto; padding: 6px 12px; font-size: 12px; font-weight: 600; border: 1px solid rgba(39,39,42,0.15); border-radius: 6px; background: #fff; color: #71717A; cursor: pointer; transition: all 0.15s; }
    .close-btn:hover { background: #FAFAFA; color: #000; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div style="display:flex;align-items:center;gap:12px;">
        <h1>OpenPrice Admin — Live Chat</h1>
        <span class="badge"><span class="badge-dot"></span>Live</span>
      </div>
      <div id="conn-status" style="font-size:11px;color:#A1A1AA;">Connecting...</div>
    </div>

    <div class="layout">
      <!-- Conversation List -->
      <div class="panel">
        <div class="tabs">
          <div class="tab active" data-filter="open" onclick="filterConvos('open')">Open</div>
          <div class="tab" data-filter="closed" onclick="filterConvos('closed')">Closed</div>
        </div>
        <div class="convo-list" id="convo-list"></div>
      </div>

      <!-- Chat Area -->
      <div class="panel">
        <div id="chat-header" class="panel-header" style="display:flex;align-items:center;gap:8px;">
          <span id="chat-title">Select a conversation</span>
          <button id="close-convo-btn" class="close-btn" style="display:none;" onclick="closeConversation()">Close Conversation</button>
        </div>
        <div class="chat-area" id="chat-area">
          <div class="messages" id="messages">
            <div class="empty-state">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg>
              <span>Select a conversation to start chatting</span>
            </div>
          </div>
          <div class="input-bar" id="input-bar" style="display:none;">
            <input type="text" id="msg-input" placeholder="Type a reply..." onkeydown="if(event.key==='Enter')sendReply()" />
            <button onclick="sendReply()" id="send-btn">&#9654;</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://vxoqwyntwsszipabhiuv.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ4b3F3eW50d3NzemlwYWJoaXV2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIxOTY4OTksImV4cCI6MjA4Nzc3Mjg5OX0.d5tbcRZlKUaTRo5kTUh8XhpztH-ZoUvgZspsfDbCB7k';

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let conversations = [];
    let activeConvoId = null;
    let messages = [];
    let currentFilter = 'open';
    let seenConvoIds = new Set();

    // Notification sound via Web Audio API
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playNotificationSound() {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);

      osc.type = 'sine';
      osc.frequency.setValueAtTime(880, audioCtx.currentTime);
      osc.frequency.setValueAtTime(1100, audioCtx.currentTime + 0.1);
      osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.2);
      gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);

      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 0.4);
    }

    // Request notification permission
    if ('Notification' in window && Notification.permission === 'default') {
      Notification.requestPermission();
    }

    function desktopNotify(title, body) {
      if ('Notification' in window && Notification.permission === 'granted') {
        new Notification(title, { body, icon: '/vite.svg' });
      }
    }

    // Load conversations
    async function loadConversations() {
      const { data } = await sb
        .from('chat_conversations')
        .select('*')
        .eq('status', currentFilter)
        .order('updated_at', { ascending: false });

      if (data) {
        conversations = data;
        renderConvoList();
      }
      document.getElementById('conn-status').textContent = 'Connected';
      document.getElementById('conn-status').style.color = '#22C55E';
    }

    function renderConvoList() {
      const list = document.getElementById('convo-list');
      if (conversations.length === 0) {
        list.innerHTML = '<div class="empty-state" style="padding:40px;"><span>No ' + currentFilter + ' conversations</span></div>';
        return;
      }
      list.innerHTML = conversations.map(c => {
        const isActive = c.id === activeConvoId;
        const isNew = !seenConvoIds.has(c.id);
        const time = new Date(c.updated_at || c.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        return `<div class="convo-item ${isActive ? 'active' : ''}" onclick="selectConvo('${c.id}')">
          <div style="display:flex;align-items:center;gap:8px;">
            ${isNew ? '<span class="convo-new"></span>' : ''}
            <span class="convo-name">${esc(c.user_name)}</span>
          </div>
          <div class="convo-meta">
            <span class="convo-dept">${c.department}</span>
            <span>${time}</span>
            <span class="${c.status === 'open' ? 'status-open' : 'status-closed'}">${c.status}</span>
          </div>
        </div>`;
      }).join('');
    }

    function filterConvos(filter) {
      currentFilter = filter;
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.filter === filter));
      loadConversations();
    }

    async function selectConvo(id) {
      activeConvoId = id;
      seenConvoIds.add(id);
      renderConvoList();

      const convo = conversations.find(c => c.id === id);
      document.getElementById('chat-title').textContent = convo ? `${convo.user_name} — ${convo.department}` : 'Chat';

      const closeBtn = document.getElementById('close-convo-btn');
      closeBtn.style.display = convo && convo.status === 'open' ? 'block' : 'none';
      document.getElementById('input-bar').style.display = convo && convo.status === 'open' ? 'flex' : 'none';

      // Load messages
      const { data } = await sb
        .from('chat_messages')
        .select('*')
        .eq('conversation_id', id)
        .order('created_at', { ascending: true });

      messages = data || [];
      renderMessages();
      document.getElementById('msg-input').focus();
    }

    function renderMessages() {
      const container = document.getElementById('messages');
      if (messages.length === 0) {
        container.innerHTML = '<div class="empty-state"><span>No messages yet</span></div>';
        return;
      }
      container.innerHTML = messages.map(m => {
        const isAgent = m.sender_role === 'agent';
        const time = new Date(m.created_at).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        return `<div class="msg ${isAgent ? 'agent' : 'user'}">
          <span class="msg-sender">${esc(m.sender_name)}</span>
          <div class="msg-bubble">${esc(m.content)}</div>
          <span class="msg-time">${time}</span>
        </div>`;
      }).join('');
      container.scrollTop = container.scrollHeight;
    }

    async function sendReply() {
      const input = document.getElementById('msg-input');
      const content = input.value.trim();
      if (!content || !activeConvoId) return;

      input.value = '';
      const { error } = await sb.from('chat_messages').insert({
        conversation_id: activeConvoId,
        sender_role: 'agent',
        sender_name: 'Admin',
        content,
      });

      if (!error) {
        await sb.from('chat_conversations').update({ updated_at: new Date().toISOString() }).eq('id', activeConvoId);
      }
    }

    async function closeConversation() {
      if (!activeConvoId) return;
      await sb.from('chat_conversations').update({ status: 'closed' }).eq('id', activeConvoId);
      activeConvoId = null;
      document.getElementById('chat-title').textContent = 'Select a conversation';
      document.getElementById('close-convo-btn').style.display = 'none';
      document.getElementById('input-bar').style.display = 'none';
      document.getElementById('messages').innerHTML = '<div class="empty-state"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/></svg><span>Conversation closed</span></div>';
      loadConversations();
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // Real-time subscriptions
    // New messages
    sb.channel('admin-messages')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat_messages' }, (payload) => {
        const msg = payload.new;
        // If it's the active conversation, add to messages
        if (msg.conversation_id === activeConvoId) {
          if (!messages.some(m => m.id === msg.id)) {
            messages.push(msg);
            renderMessages();
          }
        }
        // Notification for user messages
        if (msg.sender_role === 'user') {
          playNotificationSound();
          const convo = conversations.find(c => c.id === msg.conversation_id);
          desktopNotify('New message from ' + (convo ? convo.user_name : 'User'), msg.content);
          // Refresh convo list to update timestamps
          loadConversations();
        }
      })
      .subscribe();

    // New conversations
    sb.channel('admin-conversations')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat_conversations' }, (payload) => {
        playNotificationSound();
        desktopNotify('New conversation', payload.new.user_name + ' started a chat (' + payload.new.department + ')');
        loadConversations();
      })
      .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'chat_conversations' }, () => {
        loadConversations();
      })
      .subscribe();

    // Enable realtime for conversations too
    (async () => {
      try {
        // Note: realtime for chat_conversations needs to be enabled too
        // The migration only added chat_messages to realtime
        // We'll work with polling fallback for conversations
      } catch(e) {}
    })();

    // Initial load
    loadConversations();

    // Poll conversations every 10s as backup
    setInterval(loadConversations, 10000);
  </script>
</body>
</html>
